version: '3.9'

services:
  redis:
    container_name: redis-todoapp
    image: redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning


  postgres:
    image: postgres:17.1
    container_name: postgres-todoapp
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    environment:
      - POSTGRES_DB=todoapp-db           
      - POSTGRES_USER=admin             
      - POSTGRES_PASSWORD=a/@123456
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "todoapp-db", "-U", "admin"]
      interval: 5s
      timeout: 5s
      retries: 10   

  migrate:
    build: .
    working_dir: /app/core
    volumes:
      - ./:/app
    command: python manage.py migrate --noinput
    environment:
      - SECRET_KEY=test
      - DEBUG=False
      - DB_HOST=postgres
      - DB_NAME=todoapp-db
      - DB_USER=admin
      - DB_PASSWORD=a/@123456
    depends_on:
     - postgres
  

  backend:
    build: .
    container_name: todoapp
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    working_dir: /app/core
    volumes: 
      - ./:/app
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - SECRET_KEY=test
      - DEBUG=False
      - DB_HOST=postgres
      - DB_NAME=todoapp-db         
      - DB_USER=admin              
      - DB_PASSWORD=a/@123456                  
    depends_on:
      - redis
      - postgres
      
      
  worker:
    build: .
    working_dir: /app/core
    volumes:
      - ./:/app
    command: celery -A core worker -l INFO
    depends_on:
      - redis
      - backend
      - postgres


  beater:
    build: .
    working_dir: /app/core  
    volumes:
      - ./:/app
    command: celery -A core beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - redis
      - backend
      - postgres
    environment:
      - DB_NAME=todoapp-db
      - DB_USER=admin
      - DB_PASSWORD=a/@123456
      - DB_HOST=postgres
      
  nginx:
    image: nginx
    container_name: nginx-todoapp
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/home/app/static
      - media_volume:/home/app/media
    depends_on:
      - redis
      - backend



volumes:
  static_volume:
  media_volume:
  db_data: