name: Django Project Test & Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  Test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build images (stage)
        run: docker compose -f docker-compose-stage.yml build

      - name: Start Postgres & Redis
        run: docker compose -f docker-compose-stage.yml up -d postgres redis

      - name: Wait for Postgres
        run: |
          docker compose -f docker-compose-stage.yml exec -T postgres \
            sh -c 'until pg_isready -U admin -d todoapp-db; do sleep 1; done'

      - name: Run migrations
        run: docker compose -f docker-compose-stage.yml run --rm migrate

      - name: Start backend
        run: docker compose -f docker-compose-stage.yml up -d backend

      - name: Run Tests
        run: docker compose -f docker-compose-stage.yml exec -T backend sh -c "flake8 && pytest ."

      - name: Logs on failure
        if: failure()
        run: docker compose -f docker-compose-stage.yml logs --no-color

  Deploy:
    if: ${{ always() && contains(join(needs.*.result, ','), 'success') }}
    name: Deploy
    needs: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Connect and Execute Commands
        uses: appleboy/ssh-action@master
        with:
          username: ${{secrets.USERNAME}}
          password: ${{secrets.PASSWORD}}
          host: ${{secrets.HOST}}
          port: ${{secrets.PORT}}

